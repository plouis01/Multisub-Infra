[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
ignored_error_codes = [5740]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@safe-global/=lib/safe-smart-account/contracts/",
    "forge-std/=lib/forge-std/src/"
]

fs_permissions = [
    { access = "read", path = "./" },
    { access = "write", path = "deployments/" }
]

[profile.test]
via_ir = true
optimizer = true
optimizer_runs = 1
ignored_error_codes = [5740, 3860]

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet = "${BASE_MAINNET_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
