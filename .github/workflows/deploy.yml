name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm ci
      - run: cd backend && npx prisma generate
      - run: cd backend && npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/multisubs-backend:${{ github.sha }} ./backend
          docker push ${{ vars.ECR_REGISTRY }}/multisubs-backend:${{ github.sha }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER }}
          kubectl set image deployment/multisubs-backend backend=${{ vars.ECR_REGISTRY }}/multisubs-backend:${{ github.sha }} -n multisubs
          kubectl rollout status deployment/multisubs-backend -n multisubs --timeout=300s
