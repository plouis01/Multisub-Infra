name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts && forge build
      - run: cd contracts && forge test -vvv
      - run: cd contracts && forge test --match-path "test/invariants/*" -vvv
      - run: cd contracts && forge build --sizes
      - run: cd contracts && forge test --gas-report

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install Slither
        run: pip3 install slither-analyzer
      - name: Run Slither
        run: cd contracts && slither src/ --config-file slither.config.json || true
        continue-on-error: true
      - name: Install Aderyn
        run: cargo install aderyn || true
        continue-on-error: true
      - name: Run Aderyn
        run: cd contracts && aderyn src/ || true
        continue-on-error: true

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx prisma generate
      - run: cd backend && npx tsc --noEmit
      - run: cd backend && npm test

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd sdk && npm install
      - run: cd sdk && npx tsc --noEmit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: multisubs-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
