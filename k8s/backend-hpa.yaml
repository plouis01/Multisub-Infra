apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: multisubs-backend-hpa
  namespace: multisubs
  labels:
    app: multisubs-backend
    app.kubernetes.io/name: multisubs-backend
    app.kubernetes.io/part-of: multisubs-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: multisubs-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
