apiVersion: v1
kind: Secret
metadata:
  name: multisubs-backend-secret
  namespace: multisubs
  labels:
    app: multisubs-backend
    app.kubernetes.io/name: multisubs-backend
    app.kubernetes.io/part-of: multisubs-platform
type: Opaque
# Values should be base64-encoded and replaced at deploy time via kubectl or external secret manager
stringData:
  DATABASE_URL: "REPLACE_AT_DEPLOY_TIME"
  REDIS_URL: "REPLACE_AT_DEPLOY_TIME"
  SETTLER_PRIVATE_KEY: "REPLACE_AT_DEPLOY_TIME"
  LITHIC_API_KEY: "REPLACE_AT_DEPLOY_TIME"
  LITHIC_WEBHOOK_SECRET: "REPLACE_AT_DEPLOY_TIME"
  SUMSUB_APP_TOKEN: "REPLACE_AT_DEPLOY_TIME"
  SUMSUB_SECRET_KEY: "REPLACE_AT_DEPLOY_TIME"
